    name: "interface->Register/Unregister Pairing"
    severity: "violation"
    category: "jsonrpc_compliance"
    review_question: "Using semantic reasoning over Initialize() and Deinitialize(), is every interface->Register() (registering a notification/callback on a non-service interface) matched by a corresponding interface->Unregister() in Deinitialize()?"
    review_method: "Read the full relevant code context (control flow, ownership, lifecycle, and threading where applicable) before deciding PASS/FAIL/SUGGEST. Do not use pattern-only checks."
    evidence_requirement: "Provide exact [File:line] citation for any failure."

  - rule_id: "rule_53"
    name: "Handler Registration Order in Initialize/Deinitialize"
    severity: "violation"
    category: "jsonrpc_compliance"
    review_question: "Using semantic reasoning over Initialize() and Deinitialize(): (1) Are notification handlers registered AFTER the interfaces they observe are fully acquired and set up? (2) Is service->Unregister() the FIRST operation performed in Deinitialize() — before any resource release, interface release, or state teardown? Calling service->Unregister() at the very start of Deinitialize() is mandatory: the plugin must stop receiving IPlugin::INotification callbacks (Activated, Deactivated, Unavailable) before it begins releasing its own resources. If Unregister() happens late, a notification callback can fire on a partially-deinitialized plugin and access already-released state, causing undefined behavior or crashes."
    review_method: "Read the full relevant code context (control flow, ownership, lifecycle, and threading where applicable) before deciding PASS/FAIL/SUGGEST. Do not use pattern-only checks."
    evidence_requirement: "Provide exact [File:line] citation for any failure. For Deinitialize() ordering violations, cite both the line where service->Unregister() appears AND the line of the first resource release that precedes it."

