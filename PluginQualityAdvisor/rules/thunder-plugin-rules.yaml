    name: "connectionId Checked in IRemoteConnection Callbacks"
    severity: "violation"
    phase: "oop"

    extraction:
      target: "IRemoteConnection::INotification callback implementations (Activated, Deactivated, Terminated)"
      method: "Read the IRemoteConnection callback implementations and verify that connectionId is checked against the known connection ID before acting"
      code_block: "The IRemoteConnection callback bodies"

    bounded_query:
      question: "In every IRemoteConnection callback (Activated, Deactivated, Terminated), is the connectionId parameter checked against the plugin's known connection ID before taking action?"
      expected_answer: "Yes"

    verification_logic:
      - "1. If plugin has no IRemoteConnection::INotification implementation OR CMakeLists.txt does not have PLUGIN_<NAME>_MODE = 'Local' → SKIP"
      - "2. Read each IRemoteConnection callback body"
      - "3. Check that the first logic step guards against spurious callbacks by comparing connectionId to the stored connection ID"
      - "4. Acting on any connectionId without checking causes incorrect behavior when multiple OOP connections exist"
      - "5. If connectionId is not checked → VIOLATION"

    conditional: true
    skip_condition: "CMakeLists.txt does not have PLUGIN_<NAME>_MODE = 'Local', or plugin does not implement IRemoteConnection::INotification"

    violation_pattern: "IRemoteConnection callback does not check connectionId before acting"

    fix_template: |
      // WRONG:
      void Terminated(const uint32_t id) override {
          // acts without checking if id matches our connection
          _parent.ConnectionTerminated();
      }

      // Correct:
      void Terminated(const uint32_t id) override {
          if (id == _parent._connectionId) {
              _parent.ConnectionTerminated();
          }
      }

