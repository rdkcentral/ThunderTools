    review_question: "Using semantic reasoning over all persistent COMRPC proxy storage (member variables holding a COMRPC interface to another plugin), does the plugin use PluginSmartInterfaceType to store such proxies — rather than a raw pointer OR RPC::SmartInterfaceType directly? PluginSmartInterfaceType automatically handles the case where the remote plugin is deactivated (dangling proxy), invalidating the local reference safely by registering for IPlugin::INotification. RPC::SmartInterfaceType operates only at the COMRPC channel level via the Operational() callback — it does NOT register for Thunder plugin Activated/Deactivated lifecycle notifications and therefore does not protect against dangling references when a plugin is deactivated while the channel remains up. Exception: proxies to IController interfaces do not require this. Exception: a class that inherits RPC::SmartInterfaceType as a base class AND implements Operational() with proper event registration/unregistration (effectively reimplementing plugin-level lifecycle awareness) may be acceptable — but must be carefully reviewed to confirm it handles all deactivation cases that PluginSmartInterfaceType would handle automatically."
