# -------------------------------------------------------------------------------------------
# Phase 5C: Out-of-Process (OOP)
# -------------------------------------------------------------------------------------------

phase_5C_checkpoints:
  - rule_id: "rule_32"
    name: "OOP Connection Termination in Deinitialize"
    severity: "violation"
    phase: "oop"

    extraction:
      target: "OOP connection handling in Deinitialize() — IRemoteConnection release and channel shutdown"
      method: "Read Deinitialize() and reason about OOP connection cleanup — verify the remote connection is properly terminated"
      code_block: "The OOP connection release and cleanup code in Deinitialize()"

    bounded_query:
      question: "Does Deinitialize() properly terminate the OOP connection (release the remote implementation and close the connection channel)?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Check if plugin is OOP: look for PLUGIN_<NAME>_MODE set to 'Local' in CMakeLists.txt OR 'outofprocess = true' in {PluginName}.conf.in — if NEITHER is found → SKIP"
      - "2. Read Deinitialize() in full"
      - "3. Check that the remote implementation interface is released"
      - "4. Check that the connection channel is terminated (Terminate() called or connection closed)"
      - "5. If the OOP connection is not properly cleaned up → VIOLATION"

    conditional: true
    skip_condition: "Plugin is not OOP (neither PLUGIN_<NAME>_MODE = 'Local' in CMakeLists.txt nor outofprocess = true in .conf.in)"

    violation_pattern: "OOP connection not properly terminated in Deinitialize() — remote implementation and channel must be cleaned up"

    fix_template: |
      // WRONG:
      void Deinitialize(PluginHost::IShell* service) {
          // OOP connection not cleaned up
      }

      // Correct:
      void Deinitialize(PluginHost::IShell* service) {
          if (_implementation != nullptr) {
              _implementation->Release();
              _implementation = nullptr;
          }
          if (_connection != nullptr) {
              _connection->Terminate();
              _connection->Release();
              _connection = nullptr;
          }
      }

    citation:
      line_format: "[PluginName.cpp:LINE] OOP connection not terminated in Deinitialize()"
      rule: "thunder-plugin-rules.yaml / rule_32"

  - rule_id: "rule_33"
    name: "connectionId Checked in IRemoteConnection Callbacks"
    severity: "violation"
    phase: "oop"

    extraction:
      target: "IRemoteConnection::INotification callback implementations (Activated, Deactivated, Terminated)"
      method: "Read the IRemoteConnection callback implementations and verify that connectionId is checked against the known connection ID before acting"
      code_block: "The IRemoteConnection callback bodies"

    bounded_query:
      question: "In every IRemoteConnection callback (Activated, Deactivated, Terminated), is the connectionId parameter checked against the plugin's known connection ID before taking action?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Check if plugin is OOP: look for PLUGIN_<NAME>_MODE = 'Local' in CMakeLists.txt OR 'outofprocess = true' in {PluginName}.conf.in. If NEITHER is found OR plugin has no IRemoteConnection::INotification implementation → SKIP"
      - "2. Read each IRemoteConnection callback body"
      - "3. Check that the first logic step guards against spurious callbacks by comparing connectionId to the stored connection ID"
      - "4. Acting on any connectionId without checking causes incorrect behavior when multiple OOP connections exist"
      - "5. If connectionId is not checked → VIOLATION"

    conditional: true
    skip_condition: "Plugin is not OOP (neither PLUGIN_<NAME>_MODE = 'Local' in CMakeLists.txt nor outofprocess = true in .conf.in), or plugin does not implement IRemoteConnection::INotification"

    violation_pattern: "IRemoteConnection callback does not check connectionId before acting"

    fix_template: |
      // WRONG:
      void Terminated(const uint32_t id) override {
          // acts without checking if id matches our connection
          _parent.ConnectionTerminated();
      }

      // Correct:
      void Terminated(const uint32_t id) override {
          if (id == _parent._connectionId) {
              _parent.ConnectionTerminated();
          }
      }

    citation:
      line_format: "[PluginName.cpp:LINE] connectionId not checked in IRemoteConnection callback"
      rule: "thunder-plugin-rules.yaml / rule_33"

