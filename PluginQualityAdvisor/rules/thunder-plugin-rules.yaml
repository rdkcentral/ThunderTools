phase_8_checkpoints:
  - rule_id: "rule_38"
    name: "COM Methods Return Core::hresult"
    severity: "violation"
    phase: "interfaces"

    extraction:
      target: "COM interface method return types in plugin interface declarations"
      method: "Read all interface method declarations in plugin header files and reason about return types — COM interface methods must return Core::hresult"
      code_block: "All interface method declarations in the plugin's COM interface"

    bounded_query:
      question: "Do all COM interface methods declared in the plugin use Core::hresult as their return type?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read the plugin's interface header file"
      - "2. Identify all methods declared in COM interfaces (not class methods — interface pure virtuals)"
      - "3. Determine if the interface is tagged with @json (JSON-RPC generating)"
      - "4. For @json-tagged interfaces: Core::hresult is MANDATORY — non-hresult return types → VIOLATION"
      - "5. For COM-RPC only interfaces (no @json): Core::hresult is recommended but not mandatory — non-hresult return types → SUGGESTION"
      - "6. Exception: notification/event methods (@event) should return void, not Core::hresult"

    conditional: false
    skip_condition: null

    violation_pattern: "COM interface method does not return Core::hresult — required for Thunder 5.0+"

    fix_template: |
      // WRONG:
      virtual void GetValue(const string& key, string& value) = 0;
      virtual bool SetValue(const string& key, const string& value) = 0;

      // Correct:
      virtual Core::hresult GetValue(const string& key, string& value /* @out */) = 0;
      virtual Core::hresult SetValue(const string& key, const string& value) = 0;

    citation:
      line_format: "[PluginName.h:LINE] COM interface method does not return Core::hresult"
      rule: "thunder-plugin-rules.yaml / rule_38"

