      - "1. If no .conf.in file exists → SKIP"
      - "2. Read the .conf.in file"
      - "3. Check for an explicit startmode declaration"
      - "4. If startmode is absent BUT autostart is present AND the plugin is pre-Thunder 5.0 (namespace WPEFramework) → downgrade to SUGGESTION (autostart is the valid legacy equivalent)"
      - "5. If startmode is absent and no autostart either → VIOLATION"
      - "6. For Thunder 5.0+ plugins (namespace Thunder), startmode is mandatory regardless of autostart"

    conditional: true
    skip_condition: "No .conf.in file present for this plugin"

    violation_pattern: "startmode not declared in .conf.in — explicit startmode is required"

    fix_template: |
      # WRONG: (startmode absent from .conf.in)

      # Correct — add to PluginName.conf.in:
      startmode = Activated

    citation:
      line_format: "[PluginName.conf.in:LINE] startmode field missing"
      rule: "thunder-plugin-rules.yaml / rule_34"

  - rule_id: "rule_35"
    name: "Config Core::JSON::Container"
    severity: "violation"
    phase: "configuration"

    extraction:
      target: "Plugin configuration class declaration"
      method: "Read the plugin configuration class (typically Config inner class or separate Config header) and check if it inherits Core::JSON::Container"
      code_block: "The Config class declaration"

    bounded_query:
      question: "Does the plugin configuration class properly inherit Core::JSON::Container?"
      expected_answer: "Yes"

    verification_logic:
      - "1. If plugin has no configuration class → SKIP"
      - "2. Read the Config class declaration"
      - "3. Check that it inherits from Core::JSON::Container"
      - "4. Config classes that don't inherit Core::JSON::Container won't parse configuration correctly"
      - "5. If Core::JSON::Container inheritance is missing → VIOLATION"

    conditional: true
    skip_condition: "Plugin has no configuration class"

    violation_pattern: "Config class does not inherit Core::JSON::Container"

    fix_template: |
      // WRONG:
      class Config {   // ← missing Core::JSON::Container
      public:
          string Root;
      };

      // Correct:
      class Config : public Core::JSON::Container {
      public:
          Config() : Core::JSON::Container() {
              Add(_T("root"), &Root);
          }
          Core::JSON::String Root;
      };

    citation:
      line_format: "[PluginName.h:LINE] Config class missing Core::JSON::Container inheritance"
      rule: "thunder-plugin-rules.yaml / rule_35"

  - rule_id: "rule_36"
    name: "No Hardcoded Numeric Tuning Parameters"
    severity: "suggestion"
    phase: "configuration"

    extraction:
      target: "Magic number literals in function bodies and member initializations"
      method: "Read function bodies and member initializations and reason about numeric literals — identify any that represent tunable parameters rather than structural constants"
      code_block: "Any magic number that should come from configuration"

    bounded_query:
      question: "Are there zero hardcoded numeric tuning parameters (timeouts, sizes, counts, thresholds) in the plugin code — these come from the Config class?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read all function bodies and class member initializations"
      - "2. Reason about numeric literals: are they structural constants (0, 1, -1) or tunable parameters (timeouts like 5000, buffer sizes like 1024, retry counts like 3)?"
      - "3. Tunable parameters belong in Config — structural constants (comparison values, array indices) are acceptable inline"
      - "4. Universally known constants (e.g. MAC address size = 6, IP address lengths, protocol-defined fixed sizes) are acceptable inline — no reason to store these in config"
      - "5. If magic numbers representing tunable values are found → SUGGESTION"

    conditional: false
    skip_condition: null

    violation_pattern: "Hardcoded numeric tuning parameter — should come from Config class"

    fix_template: |
      // WRONG:
      Core::Thread::Run(5000);    // ← hardcoded 5-second timeout
      if (retries > 3) { ... }    // ← hardcoded retry count

      // Correct:
      Core::Thread::Run(_config.Timeout.Value());
      if (retries > _config.MaxRetries.Value()) { ... }

    citation:
      line_format: "[PluginName.cpp:LINE] Hardcoded numeric tuning parameter — move to Config"
      rule: "thunder-plugin-rules.yaml / rule_36"

