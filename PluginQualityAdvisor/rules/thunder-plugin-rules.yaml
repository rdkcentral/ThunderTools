# ===========================================================================================
# Thunder Plugin Rules
# ===========================================================================================

metadata:
  description: "Unified plugin validation rules — 70 rules numbered sequentially (rule_01 to rule_70), organized into 17 phases"
  approach: "semantic code review"
  total_rules: 70
  organization: |
    rule_01-rule_03: Module Structure (3)
    rule_04-rule_13: Code Style (10)
    rule_14-rule_16: Class Registration (3)
    rule_17-rule_28: Lifecycle (12)
    rule_29-rule_31: Implementation (3)
    rule_32-rule_33: Out-of-Process (2)
    rule_34-rule_36: Configuration (3)
    rule_37: CMake (1)
    rule_38: COM Interface (1)
    rule_39,40,44,67,69: Conventions & Encapsulation (5)
    rule_41,51,62: Lifecycle & State Integrity (3)
    rule_42,45-49,58-61: Concurrency & Threading (10)
    rule_43,56,63: COM Reference & Memory Safety (3)
    rule_50: Resource Management (1)
    rule_52-55,68: JSON-RPC Compliance (5)
    rule_57: Inter-Plugin & OOP Design (1)
    rule_64-66,70: Code Quality & Security (4)

  validation_approach:
    principles:
      - "ALL 70 rules follow the same review philosophy: understand the whole plugin first, then check specifics"
      - "Step 1 is ALWAYS: read the full plugin code (all files) and build mental model of architecture, ownership, lifecycle, and threading"
      - "Step 2 is: with that full understanding, examine the specific concern each rule asks about"
      - "Never check a specific block in isolation — always reason about it in the context of the full plugin"
      - "If the developer's approach is correct in the broader context (even if it technically violates the rule's literal question), downgrade severity"
      - "Never use regex or pattern matching — always semantic understanding"
      - "Severity is never escalated above the YAML-defined level"
    workflow:
      - "Step 1 UNDERSTAND: Read ALL plugin source files. Build a mental model of the plugin's architecture — its lifecycle, threading model, ownership patterns, and data flow"
      - "Step 2 FOCUS: For the specific rule, examine the relevant code block WITH the full context already understood"
      - "Step 3 REASON: Ask the rule's question. Reason about the answer using the full plugin context — not just the extracted block in isolation"
      - "Step 4 JUDGE: If the answer suggests a violation, ask: 'Is the developer's actual approach correct and safe given the full context I already understand?' If yes → downgrade. If genuinely wrong → cite it"
      - "Step 5 CITE: On violation, give exact file and line (e.g. [Dictionary.cpp:108])"
      - "Step 6 FIX: Show the corrected code block, not the whole file"

# ===========================================================================================
# PHASE CHECKPOINTS (38 rules)
# ===========================================================================================

# -------------------------------------------------------------------------------------------
# Phase 1: Module Structure
# -------------------------------------------------------------------------------------------

phase_1_checkpoints:
  - rule_id: "rule_01"
    name: "MODULE_NAME Plugin_ Prefix"
    severity: "suggestion"
    phase: "module_structure"

    extraction:
      target: "#define MODULE_NAME in Module.h"
      method: "Read Module.h and locate the #define MODULE_NAME line"
      code_block: "The #define MODULE_NAME ... line from Module.h"

    bounded_query:
      question: "Does the MODULE_NAME value start with the Plugin_ prefix (e.g. Plugin_Dictionary)?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read Module.h and find the #define MODULE_NAME line"
      - "2. Examine the value assigned to MODULE_NAME"
      - "3. Reason whether the value starts with Plugin_ as a prefix"
      - "4. If the value does not start with Plugin_ → SUGGESTION"

    conditional: false
    skip_condition: null

    violation_pattern: "MODULE_NAME does not start with Plugin_ prefix"

    fix_template: |
      // WRONG:
      #define MODULE_NAME Dictionary

      // Correct:
      #define MODULE_NAME Plugin_Dictionary

    citation:
      line_format: "[Module.h:LINE] MODULE_NAME value does not use Plugin_ prefix"
      rule: "thunder-plugin-rules.yaml / rule_01"

  - rule_id: "rule_02"
    name: "MODULE_NAME_DECLARATION"
    severity: "violation"
    phase: "module_structure"

    extraction:
      target: "MODULE_NAME_DECLARATION(BUILD_REFERENCE) call in Module.cpp"
      method: "Read Module.cpp and locate the MODULE_NAME_DECLARATION macro call"
      code_block: "The MODULE_NAME_DECLARATION line in Module.cpp"

    bounded_query:
      question: "Does Module.cpp contain MODULE_NAME_DECLARATION(BUILD_REFERENCE)?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read Module.cpp in full"
      - "2. Look for the MODULE_NAME_DECLARATION macro invocation"
      - "3. Verify the argument is BUILD_REFERENCE (not empty, not a hardcoded string)"
      - "4. If the macro is absent → VIOLATION"

    conditional: false
    skip_condition: null

    violation_pattern: "MODULE_NAME_DECLARATION(BUILD_REFERENCE) missing from Module.cpp"

    fix_template: |
      // WRONG: (missing or using wrong argument)
      // MODULE_NAME_DECLARATION(BUILD_REFERENCE)  ← not present

      // Correct:
      MODULE_NAME_DECLARATION(BUILD_REFERENCE)

    citation:
      line_format: "[Module.cpp:LINE] MODULE_NAME_DECLARATION(BUILD_REFERENCE) not found"
      rule: "thunder-plugin-rules.yaml / rule_02"

  - rule_id: "rule_03"
    name: "Module.h Uses #pragma once"
    severity: "warning"
    phase: "module_structure"

    extraction:
      target: "Include guard at top of Module.h"
      method: "Read the first 10 lines of Module.h and examine the include guard approach"
      code_block: "The header guard lines at the top of Module.h"

    bounded_query:
      question: "Does Module.h use #pragma once instead of a legacy #ifndef/#define/#endif guard?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read the first 10 lines of Module.h"
      - "2. Determine whether the include guard is #pragma once or legacy #ifndef style"
      - "3. If legacy #ifndef guard is used instead of #pragma once → WARNING"

    conditional: false
    skip_condition: null

    violation_pattern: "Module.h uses legacy #ifndef include guard instead of #pragma once"

    fix_template: |
      // WRONG:
      #ifndef __MODULE_H
      #define __MODULE_H
      // ... header content ...
      #endif

      // Correct:
      #pragma once
      // ... header content ...

    citation:
      line_format: "[Module.h:LINE] Legacy #ifndef guard — use #pragma once"
      rule: "thunder-plugin-rules.yaml / rule_03"

# -------------------------------------------------------------------------------------------
# Phase 2: Code Style
# -------------------------------------------------------------------------------------------

phase_2_checkpoints:
  - rule_id: "rule_04"
    name: "VARIABLE_IS_NOT_USED Accuracy"
    severity: "violation"
    phase: "code_style"

    extraction:
      target: "All function signatures and bodies where VARIABLE_IS_NOT_USED annotation appears"
      method: "Read each function in full — signature plus body — and reason about whether annotated parameters are actually used in the body"
      code_block: "The complete function body for each function that uses VARIABLE_IS_NOT_USED"

    bounded_query:
      question: "Are all parameters annotated with VARIABLE_IS_NOT_USED (or suppressed via the macro call in the body) genuinely unused in the function body?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read each function that uses VARIABLE_IS_NOT_USED — in any form: inline annotation in signature or macro call in body"
      - "2. For each such parameter, read the complete function body and reason semantically about whether that parameter is referenced"
      - "3. Understand Thunder's macro forms: VARIABLE_IS_NOT_USED(param) in the body and /* VARIABLE_IS_NOT_USED */ inline in the parameter list"
      - "4. A parameter is 'used' if it appears in any expression in the function body that affects behavior"
      - "5. If any annotated parameter IS actually used in the body → VIOLATION"

    conditional: false
    skip_condition: null

    violation_pattern: "VARIABLE_IS_NOT_USED applied to a parameter that is actually used in the function body"

    fix_template: |
      // WRONG:
      void Callback(VARIABLE_IS_NOT_USED const string& name, const uint32_t value) {
          ProcessValue(name, value);  // ← 'name' IS used but annotated as unused
      }

      // Correct:
      void Callback(const string& name, const uint32_t value) {
          ProcessValue(name, value);
      }

    citation:
      line_format: "[PluginName.cpp:LINE] VARIABLE_IS_NOT_USED on parameter that is actually used"
      rule: "thunder-plugin-rules.yaml / rule_04"

  - rule_id: "rule_05"
    name: "Error Code Preservation"
    severity: "violation"
    phase: "code_style"

    extraction:
      target: "Function bodies that conditionally set an error code variable"
      method: "Read each function body in full and reason about control flow — identify where an error code is conditionally assigned and then check whether it is subsequently unconditionally overwritten"
      code_block: "The function body where conditional error code assignment occurs"

    bounded_query:
      question: "In every function that conditionally sets an error code, is the error code preserved until the end — never unconditionally overwritten with ERROR_NONE or SUCCESS after being conditionally set?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read each function body that contains an error code variable (result, errorCode, ret, etc.)"
      - "2. Reason about the control flow: where is the error code assigned conditionally (inside an if block)?"
      - "3. Check whether the same variable is later unconditionally assigned a success/none value (e.g. result = Core::ERROR_NONE; outside any branch)"
      - "4. If a conditional error assignment is followed by an unconditional ERROR_NONE assignment → VIOLATION"

    conditional: false
    skip_condition: null

    violation_pattern: "Error code conditionally set but then unconditionally overwritten with ERROR_NONE/SUCCESS"

    fix_template: |
      // WRONG:
      uint32_t result = Core::ERROR_NONE;
      if (condition) {
          result = Core::ERROR_GENERAL;
      }
      result = Core::ERROR_NONE;  // ← unconditionally overwrites the conditional failure

      // Correct:
      uint32_t result = Core::ERROR_NONE;
      if (condition) {
          result = Core::ERROR_GENERAL;
      }
      return result;  // preserve the conditional error

    citation:
      line_format: "[PluginName.cpp:LINE] Error code unconditionally overwritten after conditional failure assignment"
      rule: "thunder-plugin-rules.yaml / rule_05"

  - rule_id: "rule_06"
    name: "NULL vs nullptr"
    severity: "warning"
    phase: "code_style"

    extraction:
      target: "All uses of NULL as a null pointer literal in function bodies and variable declarations"
      method: "Read each function body and variable declaration as a human reviewer, reasoning about the semantic meaning of each null expression — exclude NULL inside string literals and comments by context understanding"
      code_block: "Each line where NULL appears as a null pointer value"

    bounded_query:
      question: "Is nullptr used exclusively as the null pointer literal — no uses of NULL as a pointer value in function bodies or declarations?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read through the source files as a human reviewer"
      - "2. For each occurrence of NULL, reason about context: is it inside a string literal? a comment? or actual code?"
      - "3. NULL inside string literals (e.g. 'value is NULL') and comments must be excluded"
      - "4. NULL used as a null pointer value in code (assignments, comparisons, function arguments) → WARNING"

    conditional: false
    skip_condition: null

    violation_pattern: "NULL used as null pointer literal — should use nullptr"

    fix_template: |
      // WRONG:
      IPlugin* plugin = NULL;
      if (service == NULL) { ... }

      // Correct:
      IPlugin* plugin = nullptr;
      if (service == nullptr) { ... }

    citation:
      line_format: "[PluginName.cpp:LINE] NULL used as null pointer — use nullptr"
      rule: "thunder-plugin-rules.yaml / rule_06"

  - rule_id: "rule_07"
    name: "No delete on COM Interface Pointers"
    severity: "violation"
    phase: "code_style"

    extraction:
      target: "All delete or delete[] expressions in function bodies"
      method: "Read each function body and reason about the type of the pointer being deleted — use the variable's declared type, naming conventions, and class hierarchy context to determine if it is a COM interface type"
      code_block: "Each delete expression in the function body"

    bounded_query:
      question: "Are there zero uses of delete or delete[] on COM interface pointer types (I* types)?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read each function body and identify all delete/delete[] expressions"
      - "2. For each delete, reason about the type of the deleted pointer from its declaration, name (I prefix convention), and usage context"
      - "3. If the pointer is a COM interface type (IPlugin, IShell, IUnknown, or any I* interface) → VIOLATION"
      - "4. COM interfaces must use Release() for cleanup, not delete"

    conditional: false
    skip_condition: null

    violation_pattern: "delete used on a COM interface pointer — must use Release() instead"

    fix_template: |
      // WRONG:
      delete _service;      // COM interfaces must NOT be deleted

      // Correct:
      _service->Release();  // Use Release() for COM interfaces
      _service = nullptr;

    citation:
      line_format: "[PluginName.cpp:LINE] delete used on COM interface pointer — use Release()"
      rule: "thunder-plugin-rules.yaml / rule_07"

  - rule_id: "rule_08"
    name: "nullptr After Release"
    severity: "violation"
    phase: "code_style"

    extraction:
      target: "All ->Release() calls on member variables in function bodies"
      method: "Read each function body in full and reason about each Release() call — determine if the pointer is a member variable and whether nullptr is assigned immediately after"
      code_block: "Each Release() call on a member variable and the statement(s) immediately following it"

    bounded_query:
      question: "Is nullptr assigned to the member variable immediately after every ->Release() call on a member?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read each function body and identify all ->Release() calls"
      - "2. For each Release() call, reason about whether the pointer is a member variable (prefixed with _ or this-> by Thunder convention)"
      - "3. Check that the very next statement assigns nullptr to that pointer"
      - "4. If the member pointer is not set to nullptr immediately after Release() → VIOLATION"

    conditional: false
    skip_condition: null

    violation_pattern: "Member pointer not set to nullptr immediately after ->Release()"

    fix_template: |
      // WRONG:
      _service->Release();
      // ... other code, no nullptr assignment

      // Correct:
      _service->Release();
      _service = nullptr;

    citation:
      line_format: "[PluginName.cpp:LINE] _service->Release() not followed by _service = nullptr"
      rule: "thunder-plugin-rules.yaml / rule_08"

  - rule_id: "rule_09"
    name: "No QueryInterfaceByCallsign as Member"
    severity: "violation"
    phase: "code_style"

    extraction:
      target: "All QueryInterfaceByCallsign() call sites and the storage of their return values"
      method: "Read function bodies and class declarations and reason about the lifetime of the QueryInterfaceByCallsign() result — transient local use (acquired, used, released in same scope) is acceptable; storing in a member variable is not"
      code_block: "The QueryInterfaceByCallsign() call and any assignment of its result"

    bounded_query:
      question: "Is QueryInterfaceByCallsign() result used transiently (acquired, used, and released within the same scope) — never stored as a member variable?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read all QueryInterfaceByCallsign() call sites"
      - "2. Reason about the lifetime of the returned pointer: is it stored in a local variable or a class member?"
      - "3. If stored in a local variable and released before the function returns → acceptable"
      - "4. If stored in a class member variable (persists across calls) → VIOLATION"

    conditional: true
    skip_condition: "No QueryInterfaceByCallsign() calls found in the plugin"

    violation_pattern: "QueryInterfaceByCallsign() result stored as member variable — must be transient (acquired, used, released in same scope)"

    fix_template: |
      // WRONG:
      _remotePlugin = _service->QueryInterfaceByCallsign<IPlugin>("RemotePlugin");
      // _remotePlugin stored as member, not released until Deinitialize

      // Correct:
      IPlugin* plugin = _service->QueryInterfaceByCallsign<IPlugin>("RemotePlugin");
      if (plugin != nullptr) {
          plugin->SomeOperation();
          plugin->Release();
          plugin = nullptr;
      }

    citation:
      line_format: "[PluginName.cpp:LINE] QueryInterfaceByCallsign() result stored as member variable"
      rule: "thunder-plugin-rules.yaml / rule_09"

  - rule_id: "rule_10"
    name: "No Smart Pointers on COM Objects"
    severity: "violation"
    phase: "code_style"

    extraction:
      target: "Class member declarations and local variable declarations using smart pointer types"
      method: "Read class member declarations and function bodies and reason about whether any smart pointer wraps a COM interface type"
      code_block: "Any smart_ptr<I*> or unique_ptr<I*> member declaration"

    bounded_query:
      question: "Are there zero COM interface pointers (I* types) wrapped in shared_ptr or unique_ptr?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read all class member declarations and local variable declarations"
      - "2. Identify any shared_ptr<T> or unique_ptr<T> where T is a COM interface (I* type)"
      - "3. COM interfaces manage their own lifetime via AddRef/Release — smart pointers cause double-delete"
      - "4. If any COM interface is wrapped in a smart pointer → VIOLATION"

    conditional: false
    skip_condition: null

    violation_pattern: "COM interface pointer wrapped in shared_ptr or unique_ptr — use raw pointer with explicit Release()"

    fix_template: |
      // WRONG:
      std::shared_ptr<IPlugin> _plugin;
      std::unique_ptr<IDictionary> _dict;

      // Correct:
      IPlugin* _plugin = nullptr;
      IDictionary* _dict = nullptr;
      // Release manually in Deinitialize()

    citation:
      line_format: "[PluginName.h:LINE] COM interface wrapped in smart pointer"
      rule: "thunder-plugin-rules.yaml / rule_10"

  - rule_id: "rule_11"
    name: "No SmartLinkType for COMRPC Plugins"
    severity: "violation"
    phase: "code_style"

    extraction:
      target: "Class member declarations and typedef/using aliases for SmartLinkType"
      method: "Read class declarations and reason about member types — identify any SmartLinkType usage"
      code_block: "Any SmartLinkType declaration or usage"

    bounded_query:
      question: "Is SmartLinkType absent from the plugin — no member declarations or typedefs using SmartLinkType?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read all class declarations, member variable definitions, and typedef/using statements"
      - "2. Check for any use of SmartLinkType"
      - "3. SmartLinkType is a deprecated mechanism — COMRPC plugins must use direct interface pointers"
      - "4. If SmartLinkType is found → VIOLATION"

    conditional: false
    skip_condition: null

    violation_pattern: "SmartLinkType used — deprecated mechanism, use direct COMRPC interface pointer instead"

    fix_template: |
      // WRONG:
      SmartLinkType<IPlugin, RPC::ID_PLUGIN, &RPC::metadata<IPlugin>> _link;

      // Correct:
      IPlugin* _plugin = nullptr;
      // Acquire via QueryInterface, release in Deinitialize

    citation:
      line_format: "[PluginName.h:LINE] SmartLinkType used — deprecated, use direct interface pointer"
      rule: "thunder-plugin-rules.yaml / rule_11"

  - rule_id: "rule_12"
    name: "No delete on Plugin Object"
    severity: "violation"
    phase: "code_style"

    extraction:
      target: "All function bodies in the plugin for delete this or delete on plugin-owned objects"
      method: "Read all function bodies and reason about ownership — plugin object lifetime is managed by the Thunder framework"
      code_block: "Any delete this or delete on a plugin-managed object"

    bounded_query:
      question: "Is delete this absent from the plugin code — plugin lifetime is always managed by the Thunder framework?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read all function bodies in the plugin"
      - "2. Reason about any delete expression — particularly delete this"
      - "3. The Thunder framework owns plugin object lifetime; plugins must never delete themselves"
      - "4. If delete this is found → VIOLATION"

    conditional: false
    skip_condition: null

    violation_pattern: "delete this used in plugin code — plugin lifetime is managed by the Thunder framework"

    fix_template: |
      // WRONG:
      void SomeMethod() {
          if (done) {
              delete this;   // ← Thunder framework owns this object
          }
      }

      // Correct: signal to the framework instead
      void SomeMethod() {
          if (done) {
              _service->Submit(PluginHost::IShell::DEACTIVATED, this);
          }
      }

    citation:
      line_format: "[PluginName.cpp:LINE] delete this used — plugin lifetime is framework-managed"
      rule: "thunder-plugin-rules.yaml / rule_12"

  - rule_id: "rule_13"
    name: "No throw Keyword in Plugin Code"
    severity: "violation"
    phase: "code_style"

    extraction:
      target: "All function bodies for throw statements"
      method: "Read all function bodies as a human reviewer and reason about error-handling patterns — exclude throw inside string literals and comments by context understanding"
      code_block: "Any throw statement in executable plugin code"

    bounded_query:
      question: "Is the throw keyword absent from all executable plugin code (not inside string literals or comments)?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read all function bodies as a human reviewer"
      - "2. For each occurrence of throw, reason about context: is it in executable code, a string literal, or a comment?"
      - "3. Throw in string literals and comments must be excluded"
      - "4. Exceptions cannot cross COM boundaries — any throw in plugin code is a protocol violation"
      - "5. If throw appears in executable plugin code → VIOLATION"

    conditional: false
    skip_condition: null

    violation_pattern: "throw keyword used in plugin code — exceptions cannot cross COM boundaries"

    fix_template: |
      // WRONG:
      string Initialize(PluginHost::IShell* service) {
          if (!Init()) throw std::runtime_error("Init failed");
          return {};
      }

      // Correct:
      string Initialize(PluginHost::IShell* service) {
          if (!Init()) return "Initialization failed";
          return {};
      }

    citation:
      line_format: "[PluginName.cpp:LINE] throw keyword used — use return error string instead"
      rule: "thunder-plugin-rules.yaml / rule_13"

# -------------------------------------------------------------------------------------------
# Phase 3: Class Registration
# -------------------------------------------------------------------------------------------

phase_3_checkpoints:
  - rule_id: "rule_14"
    name: "Special Members Deleted (Main Class)"
    severity: "warning"
    phase: "class_registration"

    extraction:
      target: "The main plugin class declaration (the class implementing PluginHost::IPlugin)"
      method: "Read the main plugin class declaration in the plugin header file and check for deleted special members"
      code_block: "The special member declarations (constructors, assignment operators) in the main class"

    bounded_query:
      question: "Are all 4 special members deleted in the MAIN plugin class — copy constructor, copy assignment operator, move constructor, and move assignment operator?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read the plugin header file and identify the main plugin class (the one inheriting PluginHost::IPlugin)"
      - "2. Internal helper classes (Notification, Sink, Config, JobWorker, etc.) are explicitly excluded"
      - "3. Check that the main class has: PluginName(const PluginName&) = delete; PluginName& operator=(const PluginName&) = delete; PluginName(PluginName&&) = delete; PluginName& operator=(PluginName&&) = delete;"
      - "4. If all 4 are present and deleted → PASS"
      - "5. If any of the 4 are missing → WARNING"

    conditional: false
    skip_condition: null

    violation_pattern: "One or more of the 4 special members are not explicitly deleted in the main plugin class"

    fix_template: |
      // WRONG: (one or more missing)
      class Dictionary : public PluginHost::IPlugin {
      public:
          Dictionary() = default;
          Dictionary(const Dictionary&) = delete;
          // Missing: move ctor, copy assign, move assign

      // Correct:
      class Dictionary : public PluginHost::IPlugin {
      public:
          Dictionary() = default;
          Dictionary(const Dictionary&) = delete;
          Dictionary& operator=(const Dictionary&) = delete;
          Dictionary(Dictionary&&) = delete;
          Dictionary& operator=(Dictionary&&) = delete;

    citation:
      line_format: "[PluginName.h:LINE] Not all 4 special members deleted in main plugin class"
      rule: "thunder-plugin-rules.yaml / rule_14"

  - rule_id: "rule_15"
    name: "Plugin Metadata Registration"
    severity: "violation"
    phase: "class_registration"

    extraction:
      target: "Plugin::Metadata<PluginName> instantiation in the plugin .cpp file and SERVICE_REGISTRATION usage"
      method: "Read the plugin .cpp file and any OOP implementation files; check for Plugin::Metadata<T> and SERVICE_REGISTRATION"
      code_block: "The Plugin::Metadata<PluginName> static instance declaration and any SERVICE_REGISTRATION calls"

    bounded_query:
      question: "Does the plugin .cpp contain exactly one Plugin::Metadata<PluginName> static registration, and do all other registration points (including OOP parts) use SERVICE_REGISTRATION instead?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Read the plugin .cpp file (PluginName.cpp)"
      - "2. Check for the presence of exactly ONE static Plugin::Metadata<PluginName> registration"
      - "3. Plugin::Metadata must appear only ONCE for the entire plugin — not in multiple files"
      - "4. All other places (e.g. OOP implementation files) must use SERVICE_REGISTRATION macro instead"
      - "5. For OOP plugins (PLUGIN_<NAME>_MODE = 'Local'): verify at least one SERVICE_REGISTRATION exists in the OOP part"
      - "6. If Plugin::Metadata is absent → VIOLATION"
      - "7. If Plugin::Metadata appears more than once → VIOLATION"
      - "8. If OOP part lacks SERVICE_REGISTRATION → VIOLATION"

    conditional: false
    skip_condition: null

    violation_pattern: "Plugin::Metadata<PluginName> registration missing, duplicated, or OOP part missing SERVICE_REGISTRATION"

    fix_template: |
      // WRONG: (missing metadata registration or duplicated)

      // Correct — exactly ONE in PluginName.cpp:
      static Plugin::Metadata<Dictionary> metadata(
          Plugin::Information<Dictionary>::Versions,
          Plugin::Information<Dictionary>::Instances,
          Plugin::Information<Dictionary>::Prefix,
          Plugin::Information<Dictionary>::Interfaces,
          Plugin::Information<Dictionary>::Configuration,
          Plugin::Information<Dictionary>::Extends
      );

      // For OOP implementation files, use SERVICE_REGISTRATION instead:
      SERVICE_REGISTRATION(DictionaryImplementation, 1, 0)

    citation:
      line_format: "[PluginName.cpp:LINE] Plugin::Metadata<PluginName> registration issue"
      rule: "thunder-plugin-rules.yaml / rule_15"

  - rule_id: "rule_16"
    name: "JSONRPC Inheritance When Used"
    severity: "violation"
    phase: "class_registration"

    extraction:
      target: "Initialize() body for JSON-RPC Register() calls and the class inheritance list"
      method: "Read Initialize() and the class declaration and reason about whether JSON-RPC handler registration is present and whether the class properly inherits JSONRPC"
      code_block: "The Register() calls in Initialize() and the class inheritance declarations"

    bounded_query:
