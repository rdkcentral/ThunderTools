phase_5C_checkpoints:
  - rule_id: "rule_32"
    name: "OOP Connection Termination in Deinitialize"
    severity: "violation"
    phase: "oop"

    extraction:
      target: "OOP connection handling in Deinitialize() — IRemoteConnection release and channel shutdown"
      method: "Read Deinitialize() and reason about OOP connection cleanup — verify the remote connection is properly terminated"
      code_block: "The OOP connection release and cleanup code in Deinitialize()"

    bounded_query:
      question: "Does Deinitialize() properly terminate the OOP connection (release the remote implementation and close the connection channel)?"
      expected_answer: "Yes"

    verification_logic:
      - "1. Check CMakeLists.txt for PLUGIN_<NAME>_MODE set to 'Local' — if not present or not 'Local' → SKIP"
      - "2. Read Deinitialize() in full"
      - "3. Check that the remote implementation interface is released"
      - "4. Check that the connection channel is terminated (Terminate() called or connection closed)"
      - "5. If the OOP connection is not properly cleaned up → VIOLATION"

    conditional: true
    skip_condition: "CMakeLists.txt does not have PLUGIN_<NAME>_MODE set to 'Local'"

    violation_pattern: "OOP connection not properly terminated in Deinitialize() — remote implementation and channel must be cleaned up"

    fix_template: |
      // WRONG:
      void Deinitialize(PluginHost::IShell* service) {
          // OOP connection not cleaned up
      }

      // Correct:
      void Deinitialize(PluginHost::IShell* service) {
          if (_implementation != nullptr) {
              _implementation->Release();
              _implementation = nullptr;
          }
          if (_connection != nullptr) {
              _connection->Terminate();
              _connection->Release();
              _connection = nullptr;
          }
      }

