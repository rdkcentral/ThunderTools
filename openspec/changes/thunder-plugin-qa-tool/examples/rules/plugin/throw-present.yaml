# Checklist entry for the single-call CI prompt.
# Fields: id, severity, source, description, scope.
# No type, pattern, extract, query, or message fields needed —
# the AI model receives all applicable rules as a numbered checklist
# alongside the full plugin file and returns a JSON array of findings.

id: plugin/throw-present
severity: error
source: "09-error-handling-and-logging.md#No-Exceptions"
description: >
  throw, try, or catch found in plugin source.
  Thunder is built with -fno-exceptions; these constructs cause std::terminate()
  at runtime or a linker error depending on toolchain.
scope: any
