# Checklist entry for the single-call CI prompt.
# Fields: id, severity, source, description, scope.
# The AI model receives all applicable rules as a numbered checklist alongside
# the full plugin file and is instructed to return a JSON array of findings.

id: plugin/register-leak
severity: error
source: "10-plugin-development.md#JSON-RPC-Method-Registration"
description: >
  Register() or Subscribe() call in Initialize() has no matching Unregister() or
  Unsubscribe() call in Deinitialize(). Leaked registrations cause collisions if
  the plugin is re-activated after being deactivated.
scope: cpp
